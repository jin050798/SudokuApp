<!DOCTYPE html>
<html lang="en">
<title>Work Dashboard</title>
<link rel="icon" type="image/png" href="favicon-work.png"/>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SudokuApp</title>
    <base href="/SudokuApp/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SudokuApp.styles.css" rel="stylesheet" />
</head>
<script>
    function addKeyboardListener(dotnetHelper) {
        document.addEventListener('keydown', function (e) {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            dotnetHelper.invokeMethodAsync('HandleKeyPress', e.key);
        });
    }

    // ESC 위장 기능
    function addEscapeListener() {
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                disguise();
            }
        });

        // 창 포커스 잃으면 자동 위장
        window.addEventListener('blur', function () {
            disguise();
        });
    }

    function disguise() {
        document.getElementById('sudoku-app').style.display = 'none';
        document.getElementById('fake-work').style.display = 'block';
    }

    function undisguise() {
        document.getElementById('sudoku-app').style.display = 'block';
        document.getElementById('fake-work').style.display = 'none';
    }
</script>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
